about:
  paragraphs:
    - "Hello! I am an Integrated M.S./Ph.D. student at Gwangju Institute of Science and Technology (GIST), working in the Cognition & Intelligence Lab under the supervision of Prof. Kyung-Joong Kim."
    - "My research focuses on <b>Game Artificial Intelligence</b> and <b>Affective Computing</b>. I am interested in applying AI widely across the gaming domain."

news:
  - date: "Jun 2026"
    content: "Our paper '<b>Judging the Imitation Game</b>' has been accepted as an auxiliary paper at <b>IEEE CoG 2026</b>."
  - date: "May 2026"
    content: "I started a 2-month research visit at <a href='https://danielarus.csail.mit.edu/' target='_blank'><b>Prof. Daniela Rus</b></a>'s lab at MIT CSAIL for collaborative research discussions."
  - date: "Mar 2026"
    content: "Our team won <b>1st Place</b> in the <a href='https://www.aicrowd.com/challenges/orak-game-agent-challenge-2025/winners' target='_blank'><b>Orak Game Agent Challenge 2025 (SLM Track)</b></a> hosted by Krafton."
  - date: "Jan 2026"
    content: "Our paper '<b>PREFAB</b>' has been accepted to <b>ACM CHI 2026</b> (Honourable Mention)."
  - date: "Sep 2025"
    content: "Our paper '<b>A Humanoid Visual-Tactile-Action Dataset for Contact-Rich Manipulation</b>' has been accepted to the <b>IROS 2025 Workshop</b> on Robotic Fine Manipulation."

